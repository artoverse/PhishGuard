<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • PhishGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-red-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="relative w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-red-600 rounded-3xl flex items-center justify-center font-bold text-2xl mx-auto mb-4 shadow-lg shadow-red-600/20">PG</div>
            <h1 class="text-3xl font-bold tracking-tighter text-white">PhishGuard Auth</h1>
            <p class="text-gray-400 mt-2">Request an administrator account</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl backdrop-blur-xl">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-2xl flex items-center gap-3 text-sm font-medium">
                            <i class="fas fa-exclamation-circle text-lg"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/register" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Choose a Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" name="username" required 
                            class="w-full bg-gray-950 border border-gray-800 rounded-2xl py-3 pl-11 pr-4 text-white placeholder-gray-600 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors"
                            placeholder="username">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Create a Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" name="password" required 
                            class="w-full bg-gray-950 border border-gray-800 rounded-2xl py-3 pl-11 pr-4 text-white placeholder-gray-600 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3.5 rounded-2xl transition-all hover:shadow-lg hover:shadow-red-600/20 active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                    Submit Request <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6 text-sm text-gray-500">
            <a href="/login" class="hover:text-white transition block mt-2"><i class="fas fa-arrow-left"></i> Back to sign in</a>
        </div>
    </div>
</body>
</html>
